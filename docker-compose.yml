version: '3.9'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: stoogle_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: stoogle
      POSTGRES_USER: stoogle
      POSTGRES_PASSWORD: stoogle1234
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
